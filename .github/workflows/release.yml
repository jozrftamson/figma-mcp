name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: tag_name
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Generate changelog
      id: changelog
      run: |
        pip install gitpython
        python -c "
        import subprocess
        try:
          prev_tag = subprocess.check_output(['git', 'describe', '--tags', '--abbrev=0'], text=True).strip()
        except:
          prev_tag = 'HEAD~10'
        
        log = subprocess.check_output(['git', 'log', '--oneline', f'{prev_tag}..HEAD'], text=True)
        print(log)
        " > CHANGELOG_temp.md || echo "Initial release" > CHANGELOG_temp.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: CHANGELOG_temp.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
